apiVersion: v1
kind: ServiceAccount

metadata:
  name: nginx-service-account
  namespace: nginx-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role

metadata:
  name: nginx-role
  namespace: nginx-app

rules:
  - apiGroups: [""]
    resources: ["pods", "services"]

    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding

metadata:
  name: nginx-rolebinding
  namespace: nginx-app

subjects:
  - kind: ServiceAccount
    name: nginx-service-account
    namespace: nginx-app

roleRef:
  kind: Role
  name: nginx-role
  apiGroup: rbac.authorization.k8s.io