apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: nginx-statefulset
  namespace: nginx-app

spec:
  serviceName: nginx-service
  replicas: 2

  selector:
    matchLabels:
      app: nginx-stateful

  template:
    metadata:
      labels:
        app: nginx-stateful

    spec:
      containers:
        - name: nginx
          image: nginx:latest

          ports:
            - containerPort: 80