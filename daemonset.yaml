apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: nginx-daemonset
  namespace: nginx-app

spec:
  selector:
    matchLabels:
      app: nginx-daemon

  template:
    metadata:
      labels:
        app: nginx-daemon

    spec:
      containers:
        - name: nginx
          image: nginx:latest

          ports:
            - containerPort: 80