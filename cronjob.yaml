apiVersion: batch/v1
kind: CronJob

metadata:
  name: nginx-cronjob
  namespace: nginx-app

spec:
  schedule: "*/5 * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: nginx-job
              image: busybox

              command:
                - /bin/sh
                - -c
                - date; echo Kubernetes CronJob Running

          restartPolicy: OnFailure